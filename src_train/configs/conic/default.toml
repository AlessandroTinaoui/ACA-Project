[experiment]
pruning = false
continual = false
variant = "reversed" #reversed or standard

[data]
csv_path = "../../../datasets/Conic-Section_dataset.csv"
target_column = "shape"

[split]
test_ratio = 0.2
seed = 1

[baseline]
standardize = true

[baseline.model]
hidden = 6
grid = 3
spline_order = 3
auto_save = false
device = "auto"

[baseline.training]
optimizer = "Adam"
learning_rate = 0.01
min_learning_rate = 1e-4
weight_decay = 0
steps = 2500
label_smoothing = 0.02
early_stopping_patience = 200
early_stopping_min_delta = 0.0001
lr_scheduler_factor = 0.5
lr_scheduler_patience = 3
lr_scheduler = "CosineAnnealingLR"
grid_update_every = 10
stop_grid_update_step = 100

[baseline.plots]
clear_old_plots = true
prediction_examples = 2
high_loss_examples = 12

[baseline.output]
metrics_path = "../../conic_metrics.csv"
class_tests_path = "../../conic_class_tests.csv"
high_loss_path = "../../conic_high_loss_examples.csv"
run_config_path = "../../conic_run_config.json"
final_model_path = "../../conic_model_final.pt"
plot_dir = "../../conic_plots"

[pruning.model]
hidden = 4
grid = 3
spline_order = 3
auto_save = false
device = "auto"

[pruning.training]
optimizer = "LBFGS"
learning_rate = 0.5
standardize = true
probe_hidden = 24
probe_steps = 8
start_hidden = 4
keep_hidden_schedule = [4, 6, 8, 12, 16]
train_steps_per_model = 15

[pruning.plots]
clear_old_plots = true
prediction_examples = 2
high_loss_examples = 12
plot_edge_functions = true

[pruning.output]
metrics_path = "../../pruning_metrics.csv"
high_loss_path = "../../high_loss_examples.csv"
plot_dir = "../../pruning_plots"

[continual]
standardize = true

[continual.model]
hidden = 8
grid = 3
spline_order = 3
auto_save = false
device = "auto"

[continual.training]
epochs_per_task = [60, 80, 100, 100]
batch_size = 256
optimizer = "Adam"
learning_rate = 0.01
min_learning_rate = 0.0001
mask_future_classes = true
label_smoothing = 0.05
use_balanced_sampler = true
use_lwf = true
initial_lambda_kd = 0.5
lambda_kd_decay = 0.8
distillation_temperature = 2.0
freeze_grid_after_first = false

[continual.early_stopping]
enabled = true
check_every = 5
patience = 2
min_delta = 0.0001
anti_forgetting_enabled = true
anti_forgetting_tolerance = 0.02
anti_forgetting_patience = 5

[continual.grid]
update_every = 10
stop_update_epoch = 50

[continual.plots]
prediction_examples = 2
enable_predictions = true
enable_loss = true
enable_error = true
enable_class_tests = true
enable_confusion_matrices = true
enable_edge_functions = true

[[continual.schedule_variants.standard]]
parabola = 800
ellipse = 800

[[continual.schedule_variants.standard]]
parabola = 300
ellipse = 300
hyperbola = 800

[[continual.schedule_variants.standard]]
parabola = 200
ellipse = 200
hyperbola = 200
circle = 800

[[continual.schedule_variants.standard]]
parabola = 200
ellipse = 200
hyperbola = 200
circle = 200

[[continual.schedule_variants.reversed]]
circle = 800
hyperbola = 800

[[continual.schedule_variants.reversed]]
circle = 300
hyperbola = 300
ellipse = 800

[[continual.schedule_variants.reversed]]
circle = 200
hyperbola = 200
ellipse = 200
parabola = 800

[[continual.schedule_variants.reversed]]
circle = 200
hyperbola = 200
ellipse = 200
parabola = 200

[continual.output]
metrics_path = "../../continual_metrics.csv"
class_tests_path = "../../continual_class_tests.csv"
accuracy_config_path = "../../continual_accuracy_config.json"
run_config_path = "../../continual_run_config.json"
final_model_path = "../../continual_model_final.pt"
plot_dir = "../../continual_plots"

[continual.variant_outputs.reversed]
metrics_path = "../../continual_metrics_reversed.csv"
class_tests_path = "../../continual_class_tests_reversed.csv"
accuracy_config_path = "../../continual_accuracy_config_reversed.json"
run_config_path = "../../continual_run_config_reversed.json"
final_model_path = "../../continual_model_final_reversed.pt"
plot_dir = "../../continual_plots_reversed"
