[function]
name = "sin(2*pi*x) + 0.35*sin(10*pi*x)"
expression = "sin(2*pi*x) + 0.35*sin(10*pi*x)"

[[function.terms]]
amplitude = 1.0
frequency = 1.0

[[function.terms]]
amplitude = 0.35
frequency = 5.0

[model]
width = [1, 4, 1]
degree = 3
num_control_points = 15
num_knots = 19
x_min = 0.0
x_max = 1.0
noise_scale = 0.1
disable_base_branch = true
scale_sp = 1.0

[data]
seed = 7
train_samples = 1024
validation_samples = 256
test_samples = 256

[training]
steps = 4000
learning_rate = 0.02
min_learning_rate = 0.0001
early_stopping_patience = 300
early_stopping_min_delta = 0.0000001

[evaluation]
accuracy_tolerance = 0.02
plot_points = 800

[runtime]
device = "cpu"

[output]
output_dir = "../../../../artifacts/fun_1_d"
group_by_width = true
export_json = "mini_kan_riscv_export.json"
metrics_json = "mini_kan_metrics.json"
checkpoint_pt = "mini_kan_checkpoint.pt"
fit_plot = "mini_kan_fit.png"
spline_plot = "mini_kan_final_spline.png"
