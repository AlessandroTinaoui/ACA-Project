[function]
name = "sin(2*pi*x) + 0.35*sin(10*pi*x)"
expression = "sin(2*pi*x) + 0.35*sin(10*pi*x)"

[[function.terms]]
amplitude = 1.0
frequency = 1.0

[[function.terms]]
amplitude = 0.35
frequency = 5.0

[model]
input_dim = 1
output_dim = 1
hidden_layers = [24, 24]
activation = "tanh"
x_min = 0.0
x_max = 1.0

[data]
seed = 7
train_samples = 1024
validation_samples = 256
test_samples = 256

[training]
steps = 4000
learning_rate = 0.003
min_learning_rate = 0.00001
weight_decay = 0.000001
early_stopping_patience = 500
early_stopping_min_delta = 0.0000001

[evaluation]
accuracy_tolerance = 0.02
plot_points = 800

[runtime]
device = "cpu"

[output]
output_dir = "../../../../artifacts/sine_1d_mlp"
export_json = "mlp_riscv_export.json"
metrics_json = "mlp_metrics.json"
checkpoint_pt = "mlp_checkpoint.pt"
fit_plot = "mlp_fit.png"
loss_plot = "mlp_loss.png"
